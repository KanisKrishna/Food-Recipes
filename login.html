<!DOCTYPE html>
<html>
<head>
    <title>Login</title>
    <link rel="stylesheet" href="style.css">
</head>

<body class="login-bg">

    <div class="login-box">

        <h2>Login</h2>

        <form action="main.html">

            <!-- Username -->
            <label>Username:</label><br>
            <input type="text" pattern="admin" title="Enter admin" required><br><br>

            <!-- Email -->
            <label>Email:</label><br>
            <input type="email" pattern="admin@gmail.com" title="Enter admin@gmail.com" required><br><br>

            <!-- Password -->
            <label>Password:</label><br>
            <input type="password" pattern="1234" title="Enter password 1234" required><br><br>

            <button type="submit">Login</button>

        </form>

    </div>

</body>
</html>
